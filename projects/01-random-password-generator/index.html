<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Password Generator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="main.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/js/all.min.js"
    integrity="sha512-b+nQTCdtTBIRIbraqNEwsjB6UvL3UEMkXnhzd8awtCYh0Kcsjl9uEgwVFVbhoj3uu1DO1ZMacNvLoyJJiNfcvg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" defer></script>
  <script src="main.js" defer></script>
</head>

<body>
  <main>
    <section class="password-card" aria-labelledby="card-title">
      <h2 class="password-card__title" id="card-title">Random Password Generator</h2>
      <form class="password-card__display">
        <input type="text" class="password-card__input" placeholder="Click 'Generate'!" inputmode="none" readonly>
        <button type="button" class="password-card__btn password-card__btn--copy" aria-label="Copy Password">
          <i class="fa-regular fa-copy"></i>
        </button>
      </form>
      <button type="button" class="password-card__btn password-card__btn--generate">Generate</button>
    </section>
  </main>

  <div class="alert-card" role="alert" aria-live="assertive">
    <p class="alert-card__message"></p>
  </div>
</body>

</html>
