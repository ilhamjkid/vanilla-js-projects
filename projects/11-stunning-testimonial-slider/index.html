<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="main.css">
  <script src="main.js" defer></script>
  <title>Stunning Testimonial Slider</title>
</head>

<body>
  <main>
    <section class="testimonial">
      <div class="container">
        <div class="testimonial__empty">
          <h2>Testimonials are still <span class="no-break">empty 😔</span></h2>
        </div>
        <div class="testimonial__card-container">
          <div class="testimonial__card">
            <div class="testimonial__image-wrapper">
              <img class="testimonial__image" src="" alt="">
            </div>
            <div class="testimonial__content">
              <h2 class="testimonial__name"></h2>
              <h4 class="testimonial__role"></h4>
              <p class="testimonial__text"></p>
            </div>
          </div>
        </div>
        <div class="testimonial__btn-container">
          <button class="testimonial__slide-btn testimonial__slide-btn--prev" type="button">Prev</button>
          <button class="testimonial__slide-btn testimonial__slide-btn--next" type="button">Next</button>
        </div>
      </div>
    </section>

    <section class="loading">
      <div class="container">
        <h2 class="loading__title">Loading 😴</h2>
      </div>
    </section>
  </main>
</body>

</html>
