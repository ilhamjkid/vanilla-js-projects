<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="main.css">
  <script src="main.js" defer></script>
  <title>Age Calculator</title>
</head>

<body>
  <main>
    <section class="age-calculator">
      <div class="container">
        <h2 class="age-calculator__title">Age Calculator</h2>
        <form class="age-calculator__form">
          <div class="age-calculator__field">
            <label for="date-of-birth" class="age-calculator__label">Enter your date of birth:</label>
            <input type="date" name="date-of-birth" id="date-of-birth" class="age-calculator__input" required>
          </div>
          <button type="submit" class="age-calculator__submit-btn">Calculate Age</button>
        </form>
        <h3 class="age-calculator__result hidden"></h3>
      </div>
    </section>
  </main>
</body>

</html>
