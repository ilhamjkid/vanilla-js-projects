<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="main.css">
  <script type="module" src="main.js" defer></script>
  <title>Rock Paper Scissors Game</title>
</head>

<body>
  <main>
    <section class="rps-game">
      <div class="container">
        <h2 class="rps-game__title">Rock Paper Scissors</h2>

        <div class="rps-game__choice">
          <button data-choice="rock" class="rps-game__choice-btn rps-game__choice-btn--rock" aria-label="rock">
            <span class="fa-solid fa-hand-back-fist"></span>
          </button>
          <button data-choice="paper" class="rps-game__choice-btn rps-game__choice-btn--paper" aria-label="paper">
            <span class="fa-solid fa-hand"></span>
          </button>
          <button data-choice="scissors" class="rps-game__choice-btn rps-game__choice-btn--scissors"
            aria-label="scissors">
            <span class="fa-solid fa-hand-scissors"></span>
          </button>
        </div>

        <div class="rps-game__score">
          <div class="rps-game__score-icon"><span class="fa-solid fa-user"></span></div>
          <div class="rps-game__score-label"><span>SCORE :</span></div>
          <div class="rps-game__score-number"><span id="user-score">0</span></div>

          <div class="rps-game__score-icon"><span class="fa-solid fa-robot"></span></div>
          <div class="rps-game__score-label"><span>SCORE :</span></div>
          <div class="rps-game__score-number"><span id="comp-score">0</span></div>

          <div class="rps-game__score-btn">
            <button class="rps-game__btn-reset">Reset Score</button>
          </div>
        </div>

        <div class="rps-game__feedback hidden">
          <p class="rps-game__feedback-message">
            You chose <b id="user-choice-text"></b> and
            Computer chose <b id="comp-choice-text"></b>.
            <span id="result-message"></span>
          </p>
        </div>

        <div class="rps-game__alert hidden">
          <p class="rps-game__alert-message"></p>
        </div>
      </div>
    </section>
  </main>
</body>

</html>
