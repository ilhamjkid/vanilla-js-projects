<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="main.css">
  <script src="main.js" defer></script>
  <title>Realistic Analog Clock</title>
</head>

<body>
  <main>
    <section class="analog-clock">
      <div class="container">
        <div class="analog-clock__face">
          <div class="analog-clock__number-wrapper"></div>
          <div class="analog-clock__hand analog-clock__hand--hour" id="hour-hand"></div>
          <div class="analog-clock__hand analog-clock__hand--minute" id="minute-hand"></div>
          <div class="analog-clock__hand analog-clock__hand--second" id="second-hand"></div>
          <div class="analog-clock__center"></div>
        </div>
      </div>
    </section>
  </main>
</body>

</html>
