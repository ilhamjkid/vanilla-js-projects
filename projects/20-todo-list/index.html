<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="main.css">
  <script type="module" src="main.js" defer></script>
  <title>To-Do List</title>
</head>

<body>
  <main>
    <section class="todo-list">
      <div class="container">
        <h2 class="todo-list__title">To-Do List</h2>
        <form class="todo-list__form">
          <input type="text" class="todo-list__task-input" name="task-input" placeholder="Add your task" required>
          <button type="submit" class="todo-list__submit-btn" aria-label="Add task">Add</button>
        </form>
        <div class="todo-list__list-wrapper">
          <div class="todo-list__filter-group">
            <button type="button" class="todo-list__filter-btn selected" id="filter-all">All</button>
            <button type="button" class="todo-list__filter-btn" id="filter-active">Active</button>
            <button type="button" class="todo-list__filter-btn" id="filter-completed">Completed</button>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>

</html>
