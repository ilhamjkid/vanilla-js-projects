<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="main.css">
  <script src="main.js" defer></script>
  <title>Dynamic Auto Typing Effect</title>
</head>

<body>
  <main>
    <section class="hero">
      <div class="container">
        <h2 class="hero__title">
          <span class="hero__title--greeting">Hello!</span>
          <span class="no-break">
            My name is
            <span class="hero__title--name">Mahli</span>.
          </span>
        </h2>
        <h3 class="hero__desc">I am <span class="hero__desc--name no-break"
            data-desc='["Fullstack JS Developer", "Tech Enthusiast", "Professional Gamer"]'
            aria-live="polite"></span><span class="cursor">|</span>
        </h3>
      </div>
    </section>
  </main>
</body>

</html>
