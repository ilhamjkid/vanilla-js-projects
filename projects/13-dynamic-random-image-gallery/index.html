<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="main.css">
  <script src="main.js" defer></script>
  <title>Dynamic Random Image Gallery</title>
</head>

<body>
  <main>
    <section class="gallery">
      <div class="container">
        <h2 class="gallery__title">Image Gallery</h2>
        <p class="gallery__desc">
          A gallery containing random images from around the world.
          Press the <span>Load More</span> button at the bottom to see more images.
        </p>
        <div class="gallery__image-wrapper">
          <!-- Image Items -->
        </div>
        <button type="button" class="gallery__load-button">Load More</button>
      </div>
    </section>
  </main>
</body>

</html>
